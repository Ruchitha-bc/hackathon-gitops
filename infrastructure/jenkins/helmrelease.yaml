apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jenkins
  namespace: jenkins

spec:
  interval: 10m

  chart:
    spec:
      chart: jenkins
      version: "5.8.60"
      sourceRef:
        kind: HelmRepository
        name: jenkins
        namespace: flux-system

  values:

    controller:

      admin:
        username: admin
        password: Admin123!

      serviceType: NodePort
      servicePort: 8080
      nodePort: 32000

      javaOpts: "-Xms512m -Xmx1024m"

      installPlugins:
        - kubernetes
        - workflow-aggregator
        - git
        - docker-workflow
        - configuration-as-code

      resources:
        requests:
          cpu: "250m"
          memory: "1Gi"
        limits:
          cpu: "1000m"
          memory: "2Gi"

      persistence:
        enabled: true
        size: 10Gi

    agent:
      enabled: true

      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
