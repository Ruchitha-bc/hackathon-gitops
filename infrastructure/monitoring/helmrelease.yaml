apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmstack
  namespace: monitoring

spec:
  interval: 10m

  chart:
    spec:
      chart: victoria-metrics-k8s-stack

      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system

  values:
    vmalert:
      enabled: false

    alertmanager:
      enabled: false

    grafana:
      enabled: true

    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true
