apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 10m

  chart:
    spec:
      chart: keda
      version: "2.17.2"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system

  install:
    createNamespace: true
