apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: docs-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: docs-volume
        configMap:
          name: docs-html
---
apiVersion: v1
kind: Service
metadata:
  name: docs-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: docs
