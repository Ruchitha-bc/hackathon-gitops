apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: nginx-ingress
  namespace: default

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80

          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80
