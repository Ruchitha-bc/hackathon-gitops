apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: backend-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: backend
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 5
  advanced:                                # <-- ADD THIS BLOCK
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120 # Wait 2 minutes before scaling down
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "50"                        # <-- RAISE THIS FROM 20 TO 50

